career-profile:
    title: Career Profile
    summary: |
      Chronically curious technology professional with 20+ years of experience specializing in enterprise security architecture, cloud infrastructure, and POS data integration and retention. 
      Proven track record of implementing robust security solutions across large-scale production environments. 
      Expert in AWS cloud security, risk management & compliance frameworks such as PCI and CIS Controls. 
      Success in leading cross-functional teams and driving security initiatives in fast-paced environments. 
      Seeking a Senior Cloud Security/Architect Sr IT CyberSecurity Engineer role to leverage extensive technical expertise and leadership experience. 
